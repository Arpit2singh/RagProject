version: "3.9"

services:
  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    restart: unless-stopped

  api:
    build: .
    container_name: pdfrag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    depends_on:
      - valkey
    restart: unless-stopped

  worker:
    build: .
    container_name: pdfrag-worker
    command: python worker.py
    env_file:
      - .env
    environment:
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    depends_on:
      - valkey
    restart: unless-stopped
    # Scale later with: docker-compose up --scale worker=3

volumes:
  valkey_data: